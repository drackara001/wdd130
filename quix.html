<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML and CSS Quiz</title>
    <link rel="stylesheet" href="../styles/quix.css">
</head>

<body>
    <h1>HTML & CSS Quiz</h1>
    <form action="#" method="post">

        <!-- Question 1: Text input -->
        <label for="q1">1. What does HTML stand for?</label>
        <input type="text" id="q1" name="q1" required>

        <!-- Question 2: Textarea -->
        <label for="q2">2. Explain the difference between inline CSS and external CSS:</label>
        <textarea id="q2" name="q2" rows="4" cols="40" required></textarea>

        <!-- Question 3: Select dropdown -->
        <label for="q3">3. Which tag is used to link a CSS file in HTML?</label>
        <select id="q3" name="q3" required>
            <option value="" selected disabled>Choose One ...</option>
            <option value="link">&lt;link&gt;</option>
            <option value="style">&lt;style&gt;</option>
            <option value="script">&lt;script&gt;</option>
        </select>

        <!-- Question 4: Number input -->
        <label for="q4">4. How many heading levels does HTML provide?</label>
        <input type="number" id="q4" name="q4" min="1" max="10" required>

        <!-- Submit button -->
        <button type="submit">Submit Quiz</button>
    </form>
</body>

</html>
