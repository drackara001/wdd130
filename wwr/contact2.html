<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Thunder Wave Expedition Company</title>
    <link rel="stylesheet" href="styles/rafting1_copy.css">
    <meta name="description"
      content="Get in touch with Thunder Wave Expedition Company. Contact us for inquiries, reservations, or suggestions.">
    <meta name="author" content="Rackara David">
</head>

<body>
    <header>
        <img src="images/z-www-blue.jpg" alt="White Water Rafting Logo">
        <nav class="top-nav">
            <ul>
                <li><a href="index.html">Home</a> </li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a> </li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>

        <!-- Company Information -->
        <section class="company-info">
            <h2>Our Office</h2>
            <p>📍 Address: 123 River Road, Kampala, Uganda</p>
            <p>📞 Phone: +256-700-123456</p>
            <p>📧 Email: info@thunderwaveexpedition.com</p>

            <!-- Embedded Google Map -->
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!..." width="600" height="450"
              allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>

        <!-- Employee Profiles -->
        <section class="team">
            <h2>Meet Our Team</h2>
            <figure>
                <img src="images/employee1.jpg" alt="Guide John">
                <figcaption>Mwaka Moses – Lead River Guide</figcaption>
            </figure>
            <figure>
                <img src="images/employee2.jpg" alt="Manager Sarah">
                <figcaption>Layet Joice – Operations Manager</figcaption>
            </figure>
            <figure>
                <img src="images/employee3.jpg" alt="Instructor Mike">
                <figcaption>Oketa Dan – Safety Instructor</figcaption>
            </figure>
        </section>

        <!-- Contact Form -->
        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form action="#" method="post">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required>

                <fieldset>
                    <legend>Purpose of Message:</legend>
                    <label><input type="radio" name="purpose" value="general" required> General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation
                        Question</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Website
                        Suggestion</label>
                </fieldset>

                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <label>
                    <input type="checkbox" name="newsletter"> Please subscribe me to the monthly
                    newsletter
                </label>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 💧💧Thunder Wave Expedition💧💧 Rackara David</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook Icon"> </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="Linkedin Icon"> </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Icon"> </a>
        </nav>
    </footer>
</body>

</html>
